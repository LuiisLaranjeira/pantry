name: CI

on:
  pull_request:
  push:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --ci

  rls:
    name: RLS test suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Base tables (households, products, …) live in supabase/schema.sql, which
      # `supabase start` does not apply — only supabase/migrations/* run, and the
      # incremental migrations assume the base schema already exists. Stage
      # schema.sql as the earliest-sorting migration so the local CI database
      # builds from scratch and the existing migrations replay cleanly on top.
      # This file is generated on the runner only and is NOT committed (see
      # .gitignore), so the deployed migration set / `supabase db push` is
      # unchanged.
      - name: Stage base schema as a local-only first migration (CI only)
        run: cp supabase/schema.sql "supabase/migrations/20200101000000_ci_baseline.sql"

      - name: Start local Supabase
        run: supabase start

      - name: Capture local Supabase keys
        run: |
          status=$(supabase status --output env)
          url=$(echo "$status" | awk -F= '/^API_URL=/{print $2}' | tr -d '"')
          anon=$(echo "$status" | awk -F= '/^ANON_KEY=/{print $2}' | tr -d '"')
          service=$(echo "$status" | awk -F= '/^SERVICE_ROLE_KEY=/{print $2}' | tr -d '"')
          {
            echo "SUPABASE_URL=$url"
            echo "SUPABASE_ANON_KEY=$anon"
            echo "SUPABASE_SERVICE_ROLE_KEY=$service"
          } >> "$GITHUB_ENV"

      - name: Run RLS tests
        run: npm run test:rls

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup || true
