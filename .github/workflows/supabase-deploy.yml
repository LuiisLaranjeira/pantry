name: Supabase Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/supabase-deploy.yml'

concurrency:
  group: supabase-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'development' }}
    runs-on: ubuntu-latest
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'development' }}
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Pick project ref
        id: project
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "ref=${{ secrets.SUPABASE_PROD_PROJECT_REF }}" >> "$GITHUB_OUTPUT"
            echo "label=production" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ secrets.SUPABASE_DEV_PROJECT_REF }}" >> "$GITHUB_OUTPUT"
            echo "label=development" >> "$GITHUB_OUTPUT"
          fi

      - name: Link project
        run: supabase link --project-ref "${{ steps.project.outputs.ref }}"

      - name: Push migrations
        run: supabase db push --linked --include-all

      - name: Deploy edge functions
        run: |
          supabase functions deploy identify-product --project-ref "${{ steps.project.outputs.ref }}"
          supabase functions deploy parse-receipt --project-ref "${{ steps.project.outputs.ref }}"

      - name: Summary
        run: echo "Deployed migrations + functions to ${{ steps.project.outputs.label }} (${{ steps.project.outputs.ref }})." >> "$GITHUB_STEP_SUMMARY"
